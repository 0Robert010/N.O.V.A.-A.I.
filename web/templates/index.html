<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOVA AI</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Sistema de memória artificial</p>
          <h1>NOVA AI</h1>
          <p class="version">v0.1</p>
        </div>
        <div class="stats-card">
          <p>Conhecimentos armazenados</p>
          <strong id="knowledge-count">{{ knowledge_count }}</strong>
        </div>
      </header>

      <main class="dashboard">
        <section class="panel conversation-panel">
          <h2>Interface de conversa</h2>
          <div id="chat-log" class="chat-log">
            <div class="bubble nova">Olá, sou a NOVA. Pergunte sobre o que eu já aprendi.</div>
          </div>
          <form id="ask-form" class="input-row">
            <input id="question-input" type="text" placeholder="O que é Python?" />
            <button type="submit">Enviar</button>
          </form>
        </section>

        <section class="panel form-panel">
          <h2>Ensinar novo conhecimento</h2>
          <form id="learn-form" class="learn-form">
            <input name="name" placeholder="Nome do conceito" required />
            <input name="category" placeholder="Categoria" required />
            <input name="source" placeholder="Fonte" required />
            <input name="confidence" type="number" step="0.1" min="0.0" max="1.0" placeholder="Confiança" required />
            <textarea name="description" placeholder="Descrição" rows="4" required></textarea>
            <button type="submit">Salvar no banco</button>
          </form>

          <div class="memory-panel">
            <h3>Memória atual</h3>
            <div id="memory-list" class="memory-list"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
